name: Push Docker Image to ECR

on:
  push:
    branches:
      - main  # only run on main branch

permissions:
  id-token: write
  contents: read
  
jobs:
  push:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout your repo
      - uses: actions/checkout@v4

      # 2. Configure AWS credentials using OIDC role
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::097357356443:role/github-ecr-role
          aws-region: us-east-1  # change if needed

      # 3. Login to ECR
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # 4. Build and push Docker image
      - name: Build and Push Docker Image
        run: |
          IMAGE=${{ github.repository_owner }}.dkr.ecr.${{ github.event.repository.default_branch }}.amazonaws.com/my-app:latest
          docker build -t $IMAGE .
          docker push $IMAGE
